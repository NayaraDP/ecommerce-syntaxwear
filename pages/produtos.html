<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos | SyntaxWear</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>

<body>
    <header class="header">
        <div class="container header__container">
            <a href="../index.html" class="header__logo">SyntaxWear</a>
            <nav class="header__nav">
                <a href="../index.html#highlight" class="header__link">Destaques</a>
                <a href="../index.html#products" class="header__link">Home</a>
                <a href="../index.html#footer" class="header__link">Contato</a>
            </nav>
            <button class="button button--primary header__cart">Carrinho</button>
        </div>
    </header>

    <main class="section products">
        <div class="container">
            <header class="products__header">
                <h1 class="products__title">Catálogo de produtos</h1>
                <p class="products__subtitle">Seleção de peças prontas para entrega imediata.</p>
            </header>
            <div class="products__grid">
                <article class="card card--product">
                    <div class="card__media">Imagem</div>
                    <div class="card__content">
                        <h2 class="card__title">Camiseta Code</h2>
                        <p class="card__price">R$ 89,90</p>
                        <button class="button button--primary card__button">Comprar</button>
                    </div>
                </article>
                <article class="card card--product">
                    <div class="card__media">Imagem</div>
                    <div class="card__content">
                        <h2 class="card__title">Moletom Dev</h2>
                        <p class="card__price">R$ 179,90</p>
                        <button class="button button--primary card__button">Comprar</button>
                    </div>
                </article>
                <article class="card card--product">
                    <div class="card__media">Imagem</div>
                    <div class="card__content">
                        <h2 class="card__title">Boné Tech</h2>
                        <p class="card__price">R$ 59,90</p>
                        <button class="button button--primary card__button">Comprar</button>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <footer class="footer" id="footer">
        <div class="container footer__container">
            <div class="footer__brand">
                <a href="../index.html" class="footer__logo">SyntaxWear</a>
                <p class="footer__text">Moda para quem cria com paixão.</p>
            </div>
            <nav class="footer__nav">
                <a href="../index.html#hero" class="footer__link">Topo</a>
                <a href="../index.html" class="footer__link">Início</a>
            </nav>
        </div>
    </footer>
</body>

</html>
